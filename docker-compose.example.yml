services:
  grimoire:
    build: .
    image: grimoire:local
    container_name: grimoire
    ports:
      - "9001:9001"
    volumes:
      - /home/yeowool/models:/models:ro
      - /home/yeowool/templates:/templates:ro
      - /home/yeowool/structured-cot/grammars:/etc/grimoire/grammars:ro
      - grimoire_state:/var/lib/grimoire
    environment:
      - GRIMOIRE_API_KEY=changeme
      - TURBO_AUTO_ASYMMETRIC=0
      - STRUCTURED_COT=0
      - STRUCTURED_TOOL=0
      - STRUCTURED_TOOL_FALLBACK=0
      - TOOL_STRUCTURED_PLAN_TIMEOUT_S=8
      - TOOL_STRUCTURED_PLAN_MAX_TOKENS=192
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
volumes:
  grimoire_state:
