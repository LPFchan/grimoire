services:
  grimoire:
    build: .
    image: grimoire:local
    container_name: grimoire
    mem_limit: 28g
    memswap_limit: 28g
    oom_score_adj: 500
    ports:
      - "9001:9001"
    volumes:
      - /home/yeowool/models:/models:ro
      - /home/yeowool/templates:/templates:ro
      - /home/yeowool/structured-cot/grammars:/etc/grimoire/grammars:ro
      - /path/to/token-stats.json:/var/lib/grimoire/token-stats.json:ro
      - grimoire_state:/var/lib/grimoire
    environment:
      - GRIMOIRE_API_KEY=changeme
      - TURBO_AUTO_ASYMMETRIC=0
      - STRUCTURED_COT=0
      - STRUCTURED_TOOL=0
      - STRUCTURED_TOOL_FALLBACK=0
      - TOOL_STRUCTURED_PLAN_TIMEOUT_S=8
      - TOOL_STRUCTURED_PLAN_MAX_TOKENS=192
      # Keep llama.cpp's CPU prompt checkpoint cache from exhausting host RAM.
      - LLAMA_ARG_CACHE_RAM=2048
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
volumes:
  grimoire_state:
